<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Cậu...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Font chữ dày dặn để thông điệp nổi bật trên nền Matrix -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }

        #rotate-message {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: #ff69b4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            font-size: 1.2rem;
            padding: 20px;
            text-shadow: 0 0 10px #ff1493;
        }
        
        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid #ff69b4;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite ease-in-out;
            position: relative;
            box-shadow: 0 0 15px #ff1493;
        }
        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 8px;
            background: #ff69b4;
            border-radius: 50%;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #main-content {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Lớp chữ hiển thị đè sắc nét */
        .text-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            background: rgba(0, 0, 0, 0.15); /* Làm tối nhẹ để chữ chính ko bị nền nuốt */
        }
        
        .message {
            color: #fff;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 1px;
            /* Đổ bóng Hồng Neon cực mạnh tạo độ sâu */
            text-shadow: 0 0 10px #ff1493, 0 0 22px #ff1493, 0 0 45px #ff1493; 
            opacity: 0;
            transition: opacity 0.4s ease-in-out, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.85);
            text-align: center;
            max-width: 85%;
        }
        .message.active {
            opacity: 1;
            transform: scale(1);
        }
        
        .heart {
            font-size: 6rem;
            color: #ff1493;
            text-shadow: 0 0 20px #ff1493;
            animation: beat 0.5s infinite alternate;
            margin-bottom: 15px;
        }
        @keyframes beat {
            to { transform: scale(1.15); filter: drop-shadow(0 0 15px #ff1493); }
        }

        @media screen and (orientation: landscape) {
            #rotate-message { display: none; }
            #main-content { display: block; }
        }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div class="phone-icon"></div>
        <p>Vui lòng xoay ngang thiết bị</p>
    </div>

    <div id="main-content">
        <canvas id="matrixCanvas"></canvas>
        <div class="text-overlay">
            <div id="text-display" class="message"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // BẢNG KÝ TỰ MATRIX (Pha trộn mã hóa và icon lãng mạn)
        const letters = "010101XYZ0123456789❤️🌸✨LOVE❤️🌸✨";
        const fontSize = 15; // Giảm nhẹ size để các cột chữ dày đặc hơn
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            drops = Array(Math.floor(columns)).fill(1);
        });

        function drawMatrix() {
            // Giảm alpha xuống 0.04 giúp vệt chữ rơi kéo đuôi dài mượt mà đúng điệu Matrix
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = "bold " + fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                
                // Thuật toán Matrix: Hạt dẫn đầu dòng sẽ phát sáng trắng hồng, các hạt sau mang màu hồng neon mờ dần
                if (Math.random() > 0.98) {
                    ctx.fillStyle = "#ffffff"; // Hạt đầu phát sáng rực
                } else {
                    ctx.fillStyle = "rgba(255, 20, 147, 0.45)"; // Màu hồng neon ma trận
                }

                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 30); // Giữ nhịp rơi ổn định 60fps siêu mượt

        // KỊCH BẢN CHỮ
        const script = [
            { text: "3", duration: 1000 },
            { text: "2", duration: 1000 },
            { text: "1", duration: 1000 },
            { text: "Em đồng ý...", duration: 2500 },
            { text: "Làm người yêu", duration: 2500 },
            { text: "Anh nhé?", duration: 2500 },
            { text: "<div class='heart'>❤️</div><span style='font-size: 3.8rem; display:block; font-weight:900;'>Anh Yêu Em</span>", duration: 5000 }
        ];

        const textDisplay = document.getElementById('text-display');
        let currentStep = 0;

        function runScript() {
            if (currentStep < script.length) {
                const step = script[currentStep];
                
                if(currentStep === script.length - 1) {
                    textDisplay.style.fontSize = "3.8rem";
                } else {
                    textDisplay.style.fontSize = "5rem";
                }
                
                textDisplay.innerHTML = step.text;
                textDisplay.classList.add('active');

                setTimeout(() => {
                    textDisplay.classList.remove('active');
                    setTimeout(() => {
                        currentStep++;
                        runScript();
                    }, 500); // Khoảng trống ngắn tạo hiệu ứng dứt khoát mượt mà
                }, step.duration);
            }
        }

        let started = false;
        function checkOrientation() {
            if (window.innerWidth > window.innerHeight && !started) {
                started = true;
                setTimeout(runScript, 600); 
            }
        }
        
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);
    </script>
</body>
</html>
