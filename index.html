<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gل»­i Cل؛­u...</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <!-- 
        =========================================================
        KHU Vل»°C DأپN LINK NHل؛ C Cل»¦A Mأ€Y Vأ€O ؤگأ‚Y:
        Thay dأ²ng dئ°ل»›i ؤ‘أ¢y bل؛±ng link file .mp3 cل»§a mأ y.
        Vأ­ dل»¥: "assets/music.mp3" (nل؛؟u ؤ‘ل»ƒ cأ¹ng folder)
        =========================================================
    -->
    <script>
        const MUSIC_LINK = "https://raw.githubusercontent.com/khoaforknro/tinhto/refs/heads/main/audio_HIEUTHUHAI_download.mp3";
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Montserrat', sans-serif; }

        #rotate-message { position: fixed; inset: 0; background: #000; color: #ff69b4; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; text-align: center; }
        .phone-icon { width: 50px; height: 80px; border: 3px solid #ff69b4; border-radius: 10px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; position: relative; }
        .phone-icon::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #ff69b4; border-radius: 50%; }
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50%, 100% { transform: rotate(-90deg); } }

        #main-content { display: none; width: 100%; height: 100%; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .text-overlay { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2; background: rgba(0, 0, 0, 0.15); }
        .message { color: #fff; font-size: 5rem; font-weight: 900; text-shadow: 0 0 10px #ff1493, 0 0 22px #ff1493, 0 0 45px #ff1493; opacity: 0; transition: opacity 0.4s ease-in-out, transform 0.4s; transform: scale(0.85); text-align: center; max-width: 85%; }
        .message.active { opacity: 1; transform: scale(1); }
        .heart { font-size: 6rem; color: #ff1493; animation: beat 0.5s infinite alternate; }
        @keyframes beat { to { transform: scale(1.15); } }

        @media screen and (orientation: landscape) { #rotate-message { display: none; } #main-content { display: block; } }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div class="phone-icon"></div>
        <p>Vui lأ²ng xoay ngang thiل؛؟t bل»‹<br>(Chل؛،m ؤ‘ل»ƒ bل؛¯t ؤ‘ل؛§u)</p>
    </div>

    <div id="main-content">
        <canvas id="matrixCanvas"></canvas>
        <div class="text-overlay">
            <div id="text-display" class="message"></div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source id="audioSource" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        const audioSource = document.getElementById('audioSource');
        
        // Thiل؛؟t lل؛­p link nhل؛،c
        audioSource.src = MUSIC_LINK;
        audio.load();

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const letters = "010101XYZ0123456789â‌¤ï¸ڈًںŒ¸âœ¨LOVEâ‌¤ï¸ڈًںŒ¸âœ¨";
        const fontSize = 15;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold " + fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillStyle = (Math.random() > 0.98) ? "#ffffff" : "rgba(255, 20, 147, 0.45)";
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        const script = [
            { text: "3", duration: 1000 },
            { text: "2", duration: 1000 },
            { text: "1", duration: 1000 },
            { text: "Em ؤ‘ل»“ng أ½...", duration: 2500 },
            { text: "Lأ m ngئ°ل»‌i yأھu", duration: 2500 },
            { text: "Anh nhأ©?", duration: 2500 },
            { text: "<div class='heart'>â‌¤ï¸ڈ</div><span style='font-size: 3.8rem; display:block; font-weight:900;'>Anh Yأھu Em</span>", duration: 5000 }
        ];

        const textDisplay = document.getElementById('text-display');
        let currentStep = 0;
        let started = false;

        function runScript() {
            if (currentStep < script.length) {
                const step = script[currentStep];
                textDisplay.innerHTML = step.text;
                textDisplay.classList.add('active');
                setTimeout(() => {
                    textDisplay.classList.remove('active');
                    setTimeout(() => { currentStep++; runScript(); }, 500);
                }, step.duration);
            }
        }

        function startExperience() {
            if (!started && window.innerWidth > window.innerHeight) {
                started = true;
                audio.play();
                runScript();
                document.removeEventListener('click', startExperience);
                document.removeEventListener('touchstart', startExperience);
            }
        }

        document.addEventListener('click', startExperience);
        document.addEventListener('touchstart', startExperience);
    </script>
</body>
</html>
