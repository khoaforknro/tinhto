<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Cậu...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Nhúng Font thành công -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif; /* Mặc định dùng Montserrat cho các phần thông báo */
        }

        #rotate-message {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            font-size: 1.2rem;
            padding: 20px;
        }
        
        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite ease-in-out;
            position: relative;
        }
        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #main-content {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .text-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        
        /* CẬP NHẬT: Áp dụng font lãng mạn mặc định cho các câu chữ */
        .message {
            font-family: 'Great Vibes', cursive;
            color: #ff69b4;
            font-size: 5.5rem; /* Tăng size một chút vì font viết tay thường mảnh */
            text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4;
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            transform: scale(0.8);
            text-align: center;
            max-width: 85%;
        }
        .message.active {
            opacity: 1;
            transform: scale(1);
        }
        
        .heart {
            font-size: 6rem;
            color: #ff1493;
            animation: beat 0.6s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }

        @media screen and (orientation: landscape) {
            #rotate-message { display: none; }
            #main-content { display: block; }
        }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div class="phone-icon"></div>
        <p>Vui lòng xoay ngang thiết bị của bạn</p>
    </div>

    <div id="main-content">
        <canvas id="matrixCanvas"></canvas>
        <div class="text-overlay">
            <div id="text-display" class="message"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Đổi ký tự matrix sang các ký tự ngọt ngào cho hợp vibe lãng mạn
        const letters = "love❤️🌸✨youforeveramoursilence";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            drops = Array(Math.floor(columns)).fill(1);
        });

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255, 105, 180, 0.35)"; // Giảm độ đậm của nền xuống để nổi bật chữ chính
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        const script = [
            { text: "3", duration: 1000 },
            { text: "2", duration: 1000 },
            { text: "1", duration: 1000 },
            { text: "Em đồng ý...", duration: 2500 },
            { text: "Làm người yêu", duration: 2500 },
            { text: "Anh nhé? ", duration: 2500 },
            { text: "<div class='heart'>❤️</div><span style='font-size:3.5rem; display:block;'>Anh Yêu Em</span>", duration: 5000 }
        ];

        const textDisplay = document.getElementById('text-display');
        let currentStep = 0;

        function runScript() {
            if (currentStep < script.length) {
                const step = script[currentStep];
                
                // CẬP NHẬT: Nếu là số đếm ngược (3, 2, 1) thì dùng font Montserrat cho hiện đại và rõ nét
                if(currentStep < 3) {
                    textDisplay.style.fontFamily = "'Montserrat', sans-serif";
                    textDisplay.style.fontSize = "6rem";
                    textDisplay.style.fontWeight = "900";
                } else {
                    // Chuyển sang font lãng mạn Great Vibes cho lời tỏ tình
                    textDisplay.style.fontFamily = "'Great Vibes', cursive";
                    textDisplay.style.fontWeight = "normal";
                    if(currentStep === script.length - 1) {
                        textDisplay.style.fontSize = "4.5rem"; // Tối ưu kích thước câu cuối
                    } else {
                        textDisplay.style.fontSize = "6rem";
                    }
                }
                
                textDisplay.innerHTML = step.text;
                textDisplay.classList.add('active');

                setTimeout(() => {
                    textDisplay.classList.remove('active');
                    setTimeout(() => {
                        currentStep++;
                        runScript();
                    }, 1000); 
                }, step.duration);
            }
        }

        let started = false;
        function checkOrientation() {
            if (window.innerWidth > window.innerHeight && !started) {
                started = true;
                setTimeout(runScript, 500); 
            }
        }
        
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);
    </script>
</body>
</html>
